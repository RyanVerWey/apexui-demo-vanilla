<main class="app-shell" data-apex-theme="indigo-dark" id="app-shell">
  <apex-app-bar heading="Northstar Field Services">
    <div class="app-bar-actions" slot="actions">
      <apex-badge tone="info" id="theme-badge">indigo-dark</apex-badge>
      <apex-button-group label="Theme mode">
        <apex-button id="theme-light" size="sm" variant="secondary">Light</apex-button>
        <apex-button id="theme-dark" size="sm">Dark</apex-button>
      </apex-button-group>
    </div>
  </apex-app-bar>

  <div class="app-main">
    <div class="app-layout">
      <apex-sidebar id="nav" heading="Northstar" label="Site sections"></apex-sidebar>
      <section class="route-panel" id="route-view" aria-live="polite"></section>
    </div>
  </div>

  <apex-snackbar id="snackbar" tone="success"></apex-snackbar>
</main>
<script type="module" src="/src/main.ts"></script>
